<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Static Linkedin</title>
</head>
<body>
    

    <header>
        <div id="search-nav">
            <img src="/icons/logo.svg" alt="Logo Linkedin">
            <input type="search" name="search" id="search" placeholder="Pesquisar">
        </div>     
    
    <nav id="nav-links">
            <p class="conjunto-nav">
                <img class="icon" src="/icons/inicio.svg" alt="Icone de inicio">
                Inicio
            </p>
            
            <p class="conjunto-nav">
                <img class="icon"src="/icons/people.svg" alt="">
                Minha rede
            </p>
            <p class="conjunto-nav">
                <img class="icon" src="/icons/vagas.svg" alt="">
                Vagas
            </p>
            <p class="conjunto-nav">
                <img class="icon" src="/icons/mensage.svg" alt="">
                Mensagens
            </p>
            <p class="conjunto-nav">
                <img class="icon" src="/icons/notification.svg" alt="">
                Notificações
            </p>
            <p class="conjunto-nav">
                <img class="icon" src="/icons/solution.svg" alt="">
                Soluções
            </p>
        </nav>
    </header>

    <main id="main-container">


        <section id="container-posts">

            <article class="sections" id="profile-section">

                <div id="capa-container">
                    <img class="capa" src="/img-profile/backgroundProfile.svg" alt="">

                    <img class="foto-perfil" src="/img-profile/profile.svg" alt="">
                </div>

                <section id="container-profile">
                    <section id="sobre-profile">

                        <h3>Kayanne Farias</h3>

                        <h5>Desenvolvedora | HTML | CSS | Typescript | Node</h5>

                        <p class="p-profile">Fala sobre #javascript, #frontend, #reactjs, e #backend</p>

                        <div class="infos-profile">
                            <p class="p-profile">Cidade, estado e país </p>
                            <img src="/img-profile/eclipse.svg" alt="eclipse">
                            <span>Informações de contato</span>
                        </div>

                        <div class="infos-profile">
                            <span class="p-profile">Seguidores</span>
                            <img src="/img-profile/eclipse.svg" alt="eclipse">
                            <span class="p-profile">Conexões</span>
                        </div>

                        <div id="button-profile">
                            <button class="button" id="button-msg" type="button">Mensagens</button>
                            <button class="button" id="button-mais" type="button">Mais</button>
                        </div>
                        
                    </section>

                    <aside id="sobre-experience">
                        <div class="aside-profile">
                            <img src="/img-profile/empresa.svg" alt="Empresa" >
                            <p>Empresa</p>
                        </div>

                        <div class="aside-profile">
                            <img src="/img-profile/estudo.svg" alt="Ensino" >
                            <p>Instituição de Ensino</p>
                        </div>
                    </aside>
                </section>




            </article>

            <section class="sections" id="destaque-section">
                <h4>Destaques</h4>
                <div id="img-destaques">
                    <img src="/img-destaques/destaques01.svg" alt="">
                    <img src="/img-destaques/destaques02.svg" alt="">
                    <img src="/img-destaques/destaques3.svg" alt="">
                </div>

            </section>

            <section class="sections" id="atividade-section"></section>

            <article class="sections" id="sobre-section"></article>

            <section class="sections" id="formacao-section"></section>

            <section class="sections" id="idiomas-section"></section>



        </section>



        <aside id="info-lateral">



            <section id="pessoas-visualizaram"></section>



            <section id="pessoas-conhecidas"></section>

        </aside>


    </main>


    
</body>
</html>
